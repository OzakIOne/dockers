name: homer
services:
  homer:
    image: b4bz/homer
    container_name: homer
    # ports:
    #   - 8084:8080
    volumes:
      - ./assets:/www/assets
    environment:
      - INIT_ASSETS=0
    networks:
      - traefik
    restart: always

networks:
  traefik:
    name: traefik
    external: true
