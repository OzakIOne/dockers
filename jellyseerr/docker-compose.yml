name: jellyseerr
services:
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    volumes:
      - ./config:/app/config
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Paris
      - PORT=5055 #optional
    ports:
      - '5055:5055'
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    name: traefik
    external: true
