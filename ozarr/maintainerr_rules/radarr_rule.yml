mediaType: MOVIES
rules:
  - "0":
      - firstValue: Seerr.isRequested
        action: EQUALS
        customValue:
          type: boolean
          value: "true"
      - operator: AND
        firstValue: Seerr.mediaAddedAt
        action: BEFORE
        customValue:
          type: custom_days
          value: "30"
