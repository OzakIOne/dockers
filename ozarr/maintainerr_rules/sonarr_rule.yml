mediaType: SEASONS
rules:
  - "0":
      - firstValue: Seerr.isRequested
        action: EQUALS
        customValue:
          type: boolean
          value: "true"
      - operator: AND
        firstValue: Jellyfin.sw_lastWatched
        action: NOT_EXISTS
      - operator: AND
        firstValue: Sonarr.tags
        action: NOT_CONTAINS_PARTIAL
        customValue:
          type: text
          value: Perma
  - "1":
      - firstValue: Seerr.isRequested
        action: EQUALS
        customValue:
          type: boolean
          value: "true"
      - operator: AND
        firstValue: Jellyfin.sw_lastWatched
        action: BEFORE
        customValue:
          type: custom_days
          value: "7"
      - operator: AND
        firstValue: Sonarr.tags
        action: NOT_CONTAINS_PARTIAL
        customValue:
          type: text
          value: Perma
  - "2":
      - firstValue: Seerr.isRequested
        action: EQUALS
        customValue:
          type: boolean
          value: "false"
      - operator: AND
        firstValue: Jellyfin.sw_lastWatched
        action: NOT_EXISTS
      - operator: AND
        firstValue: Sonarr.tags
        action: NOT_CONTAINS_PARTIAL
        customValue:
          type: text
          value: Perma
  - "3":
      - firstValue: Sonarr.diskspace_remaining_gb
        action: SMALLER
        customValue:
          type: number
          value: 20
      - operator: AND
        firstValue: Jellyfin.sw_lastWatched
        action: NOT_EXISTS
      - operator: AND
        firstValue: Sonarr.tags
        action: NOT_CONTAINS_PARTIAL
        customValue:
          type: text
          value: Perma
