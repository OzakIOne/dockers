name: ozarr
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    env_file: .env
    environment:
      - UMASK=${UMASK}
    volumes:
      - ./config/jellyfin:/config
      - ./data/media:/data/media
    ports:
      - "1900:1900/udp"
      - "7359:7359/udp"
      - "8096:8096"
      - "8920:8920"
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    env_file: .env
    environment:
      - UMASK=${UMASK}
      - WEBUI_PORT=8888
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - ./config/qbittorrent:/config
      - ./data:/data
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8888:8888"
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    ports:
      - "7476:7476"
    volumes:
      - ./config/qui:/config
      - ./data:/data
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7476/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      qbittorrent:
        condition: service_healthy

  qbit_manage:
    image: ghcr.io/stuffanthings/qbit_manage:latest
    container_name: qbit_manage
    env_file: .env
    environment:
      - UMASK=${UMASK}
      # Web API / Web UI
      - QBT_WEB_SERVER=true
      - QBT_PORT=8181
      # Scheduler
      - QBT_RUN=false
      - QBT_SCHEDULE=1440
      - QBT_CONFIG_DIR=/config
      - QBT_LOGFILE=qbit_manage.log
      # Command flags
      - QBT_RECHECK=false
      - QBT_CAT_UPDATE=false
      - QBT_TAG_UPDATE=false
      - QBT_REM_UNREGISTERED=false
      - QBT_REM_ORPHANED=false
      - QBT_TAG_TRACKER_ERROR=false
      - QBT_TAG_NOHARDLINKS=false
      - QBT_SHARE_LIMITS=false
      - QBT_SKIP_CLEANUP=false
      - QBT_DRY_RUN=false
      - QBT_STARTUP_DELAY=0
      - QBT_SKIP_QB_VERSION_CHECK=false
      - QBT_DEBUG=false
      - QBT_TRACE=false
      # Logging
      - QBT_LOG_LEVEL=INFO
      - QBT_LOG_SIZE=10
      - QBT_LOG_COUNT=5
    volumes:
      - ./config/qbit_manage:/config:rw
      - ./data:/data:rw # must mirror qbittorrent's ./data:/data mapping
      - ./config/qbittorrent:/qbittorrent:ro # for save_torrents (BT_backup)
    ports:
      - "8181:8181"
    networks:
      - traefik
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file: .env
    environment:
      - UMASK=${UMASK}
    volumes:
      - ./config/sonarr:/config
      - ./data:/data
    ports:
      - "8989:8989"
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    env_file: .env
    environment:
      - UMASK=${UMASK}
    volumes:
      - ./config/radarr:/config
      - ./data:/data
    ports:
      - "7878:7878"
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/homarr:/appdata
    ports:
      - "7575:7575"
    networks:
      - traefik
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    env_file: .env
    environment:
      - LOG_LEVEL=info
    volumes:
      - ./config/seerr:/app/config
    ports:
      - "5055:5055"
    networks:
      - traefik
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      jellyfin:
        condition: service_healthy

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    env_file: .env
    environment:
      - UMASK=${UMASK}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "9696:9696"
    networks:
      - traefik
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      jellyfin:
        condition: service_healthy

  # https://github.com/ThePhaseless/Byparr/
  # https://github.com/germondai/trawl
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    env_file: .env
    volumes:
      - ./config/flaresolverr:/config
    ports:
      - "8191:8191"
    networks:
      - traefik
    restart: unless-stopped

  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr
    ports:
      - 5690:5690
    volumes:
      - ./config/wizarr:/data
    env_file: .env
    networks:
      - traefik
    depends_on:
      qbittorrent:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      jellyfin:
        condition: service_healthy

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    ports:
      - "6868:6868"
    volumes:
      - ./config/profilarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # Uncomment ORIGIN if you use a reverse proxy to access your containers.
      #- ORIGIN=https://profilarr.yourdomain.com
      - PARSER_HOST=parser
      - PARSER_PORT=5000
    networks:
      - traefik
    depends_on:
      parser:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      jellyfin:
        condition: service_healthy

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest # or ghcr.io/maintainerr/maintainerr:development (to test unreleased changes)
    container_name: maintainerr
    user: 1000:1000
    volumes:
      - type: bind
        source: ./config/maintainerr
        target: /opt/data
    environment:
      - TZ=Europe/Paris
    #      - BASE_PATH=/maintainerr # uncomment if you're serving maintainerr from a subdirectory
    #      - UI_HOSTNAME=:: # uncomment if you want to listen on IPv6 instead (default 0.0.0.0)
    #      - UI_PORT=6247 # uncomment to change the UI port (default 6246)
    #      - GITHUB_TOKEN=ghp_yourtoken # Optional: GitHub Personal Access Token for higher API rate limits (60/hr without, 5000/hr with token)
    ports:
      - 6246:6246
    restart: unless-stopped
    healthcheck: # already baked into the image; included here so you can tune it
      test: ["CMD", "/opt/app/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - traefik

  # Optional - only needed for CF/QP testing
  parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    expose:
      - "5000"

networks:
  traefik:
    name: traefik
    external: true
