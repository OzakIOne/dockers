name: nginxproxymanager
services:
  nginxproxymanager:
    image: 'jc21/nginx-proxy-manager:latest'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    name: traefik
    external: true
